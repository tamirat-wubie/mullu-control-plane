name: secret-action-boundary

on:
  pull_request:
  workflow_dispatch:

jobs:
  evidence-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Format
        run: cargo fmt --all -- --check
      - name: Test v23 evidence boundaries
        run: cargo test -p mind-core v23_secret_connector_admission_notification --test v23_secret_connector_admission_notification
