name: mandatory-readiness-gates

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  readiness-gate:
    name: mandatory readiness gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Executable readiness evidence
        run: |
          cargo test -p mind-core --test v18_executable_readiness_jobs
          cargo test -p mind-core --test v19_enforced_readiness_engineering
          cargo test -p mind-store-sqlite --test sqlite_v19_ledgers
