[package]
name = "mind-api"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
axum = "0.8"
mind-core = { path = "../mind-core" }
mind-connectors = { path = "../mind-connectors" }
mind-store-sqlite = { path = "../mind-store-sqlite" }
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
time.workspace = true

[features]
default = []
provider-aws-kms = ["mind-core/provider-aws-kms", "mind-connectors/provider-aws-kms"]
provider-aws-s3 = ["mind-core/provider-aws-s3", "mind-connectors/provider-aws-s3"]
provider-gcp-kms = ["mind-core/provider-gcp-kms", "mind-connectors/provider-gcp-kms"]
provider-gcs = ["mind-core/provider-gcs", "mind-connectors/provider-gcs"]
provider-azure-key-vault = ["mind-core/provider-azure-key-vault", "mind-connectors/provider-azure-key-vault"]
provider-azure-blob = ["mind-core/provider-azure-blob", "mind-connectors/provider-azure-blob"]
provider-vault = ["mind-core/provider-vault", "mind-connectors/provider-vault"]
provider-pkcs11 = ["mind-core/provider-pkcs11", "mind-connectors/provider-pkcs11"]
provider-http-gateway = ["mind-core/provider-http-gateway", "mind-connectors/provider-http-gateway"]
provider-local-mirror = ["mind-core/provider-local-mirror", "mind-connectors/provider-local-mirror"]
