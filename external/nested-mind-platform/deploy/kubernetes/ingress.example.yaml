apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mind-api
  namespace: nested-mind
spec:
  rules:
    - host: api.mullusi.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mind-api
                port:
                  name: http
