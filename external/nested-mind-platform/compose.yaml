services:
  mind-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      MULLU_ENV: ${MULLU_ENV:-local_dev}
      MULLU_ENV_REQUIRED: ${MULLU_ENV_REQUIRED:-true}
      RUST_LOG: info
      MIND_ROOT_ID: ${MIND_ROOT_ID:-00000000-0000-0000-0000-000000000001}
      MIND_ROOT_KIND: ${MIND_ROOT_KIND:-root}
      MIND_EVENT_DB: /app/data/mind-events.sqlite
      MIND_REQUIRE_SIGNATURES: ${MIND_REQUIRE_SIGNATURES:-false}
      MIND_SIGNING_BACKEND: ${MIND_SIGNING_BACKEND:-env_ed25519}
      MIND_COMMIT_SIGNING_KEY_ID: ${MIND_COMMIT_SIGNING_KEY_ID:-root-runtime-ed25519}
      MIND_COMMIT_SIGNING_SEED_HEX: ${MIND_COMMIT_SIGNING_SEED_HEX:-}
      MIND_BOOTSTRAP_TOKEN: ${MIND_BOOTSTRAP_TOKEN:-}
      MIND_BOOTSTRAP_PRINCIPAL: ${MIND_BOOTSTRAP_PRINCIPAL:-tamirat}
      MIND_TRUSTED_IDENTITY_HEADERS: ${MIND_TRUSTED_IDENTITY_HEADERS:-false}
      MIND_IDENTITY_ALLOWED_ISSUERS: ${MIND_IDENTITY_ALLOWED_ISSUERS:-}
      MIND_IDENTITY_REQUIRED_AUDIENCES: ${MIND_IDENTITY_REQUIRED_AUDIENCES:-}
      MIND_IDENTITY_REQUIRED_CLIENT_CERT_SHA256: ${MIND_IDENTITY_REQUIRED_CLIENT_CERT_SHA256:-}
      MIND_BACKUP_OBJECT_DIR: /app/data/object-store
      MIND_BACKUP_OBJECT_BUCKET: ${MIND_BACKUP_OBJECT_BUCKET:-mind-backups}
      MIND_EVENT_STORE_STRATEGY: ${MIND_EVENT_STORE_STRATEGY:-single_writer}
      MIND_NODE_ID: ${MIND_NODE_ID:-local}
      MIND_NODE_ROLE: ${MIND_NODE_ROLE:-single}
      MIND_VOTING_MEMBERS: ${MIND_VOTING_MEMBERS:-1}
      MIND_QUORUM_SIZE: ${MIND_QUORUM_SIZE:-1}
      MIND_ALLOW_LOCAL_APPENDS: ${MIND_ALLOW_LOCAL_APPENDS:-true}
      MIND_SNAPSHOT_KEEP_LATEST: ${MIND_SNAPSHOT_KEEP_LATEST:-3}
      MIND_SNAPSHOT_MIN_EVENTS_BETWEEN: ${MIND_SNAPSHOT_MIN_EVENTS_BETWEEN:-25}
      MIND_OBSERVABILITY_LOG: /app/data/observability.jsonl
      MIND_OBSERVABILITY_USE_EVENT_DB: ${MIND_OBSERVABILITY_USE_EVENT_DB:-true}
      MIND_MAX_BODY_BYTES: ${MIND_MAX_BODY_BYTES:-65536}
      MIND_RATE_LIMIT_REQUESTS: ${MIND_RATE_LIMIT_REQUESTS:-60}
      MIND_RATE_LIMIT_WINDOW_SECONDS: ${MIND_RATE_LIMIT_WINDOW_SECONDS:-60}
      MIND_LOG_LEVEL: ${MIND_LOG_LEVEL:-mind_api=info,tower_http=info}
      MIND_TRACE_JSON: ${MIND_TRACE_JSON:-false}
    volumes:
      - mind-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mind-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["mind-worker"]
    depends_on:
      - mind-api
    environment:
      MULLU_ENV: ${MULLU_ENV:-local_dev}
      MULLU_ENV_REQUIRED: ${MULLU_ENV_REQUIRED:-true}
      MIND_EVENT_DB: /app/data/mind-events.sqlite
      MIND_WORKER_ID: ${MIND_WORKER_ID:-worker-a}
      MIND_WORKER_MODE: ${MIND_WORKER_MODE:-plan}
      MIND_WORKER_MAX_TICKS: ${MIND_WORKER_MAX_TICKS:-0}
      MIND_WORKER_MAX_JOBS_PER_TICK: ${MIND_WORKER_MAX_JOBS_PER_TICK:-10}
      MIND_WORKER_TICK_INTERVAL_MS: ${MIND_WORKER_TICK_INTERVAL_MS:-1000}
      MIND_WORKER_LEASE_SECONDS: ${MIND_WORKER_LEASE_SECONDS:-60}
      MIND_WORKER_STOP_AFTER_IDLE_TICKS: ${MIND_WORKER_STOP_AFTER_IDLE_TICKS:-0}
    volumes:
      - mind-data:/app/data
volumes:
  mind-data:
