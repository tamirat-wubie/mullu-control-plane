# Purpose: machine-readable public-safe company-boundary kernel ledger.
# Governance scope: Foundation Mode claim control, IP provenance, secrets restraint, continuity restraint, customer/payment/deployment/legal/patent/trademark/compliance deferral.
# Dependencies: docs/FOUNDATION_COMPANY_BOUNDARY_KERNEL.md, examples/foundation_company_boundary_kernel_witness.awaiting_evidence.json, scripts/validate_foundation_company_boundary_kernel.py.
# Invariants: all authorization flags remain false; all surfaces remain AwaitingEvidence; no secrets, account values, private paths, or live endpoint values are stored here.

schema_version: foundation.company_boundary_kernel.ledger.v1
ledger_id: foundation_company_boundary_kernel.ledger.v1
status: AwaitingEvidence
solver_outcome: AwaitingEvidence
foundation_mode_required: true
promotion_authority: promotion_witness_required
non_authorization_rule: "This ledger does not authorize company formation, legal claims, customer access, deployment, payment activation, patent filing, trademark claim, compliance certification, money movement, public launch, or external obligation."
next_action: "keep every surface in AwaitingEvidence until exact review evidence and a promotion witness exist"

authorization_flags:
