version: "3.9"

# Nightly infrastructure certification profile.
# Usage: docker compose -f docker-compose.nightly.yml up -d
# Then:  cd mcoi && pytest -m "infra_pg or infra_smtp" --tb=short

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mullu_test
      POSTGRES_USER: mullu
      POSTGRES_PASSWORD: test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mullu -d mullu_test"]
      interval: 3s
      timeout: 2s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI + API
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 3s
      timeout: 2s
      retries: 10
