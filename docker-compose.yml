version: "3.9"

networks:
  mullu-net:
    driver: bridge

services:
  # PostgreSQL production database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mullu
      POSTGRES_USER: mullu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mullu-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mullu -d mullu"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # Mullu Platform API server
  mullu:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MULLU_ENV: pilot
      MULLU_API_AUTH_REQUIRED: "true"
      MULLU_DB_BACKEND: postgresql
      MULLU_DB_URL: "postgresql://mullu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/mullu"
      MULLU_LLM_BACKEND: stub
      MULLU_LLM_MODEL: "claude-sonnet-4-20250514"
      MULLU_LLM_BUDGET_MAX_COST: "100.0"
      MULLU_LLM_BUDGET_MAX_CALLS: "10000"
      MULLU_PII_SCAN: "true"
      MULLU_CERT_ENABLED: "true"
      MULLU_CERT_INTERVAL: "300"
      MULLU_STATE_DIR: "/data/state"
      # MULLU_CORS_ORIGINS: ""  # Set to frontend URL in production
      # Set these to enable real LLM backends:
      # ANTHROPIC_API_KEY: ""
      # OPENAI_API_KEY: ""
      # Additional providers (optional):
      # GROQ_API_KEY: ""
      # GEMINI_API_KEY: ""
      # DEEPSEEK_API_KEY: ""
      # XAI_API_KEY: ""
      # MISTRAL_API_KEY: ""
      # OPENROUTER_API_KEY: ""
      # Governance (optional):
      # MULLU_JWT_SECRET: ""  # base64-encoded 32-byte key for JWT auth
      # MULLU_JWT_ISSUER: "mullu"
      # MULLU_JWT_AUDIENCE: "mullu-api"
      # MULLU_ENCRYPTION_KEY: ""  # base64-encoded 32-byte AES key for field encryption
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - state-data:/data/state
    networks:
      - mullu-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # Mullu Gateway — channel webhook server
  gateway:
    build: .
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "gateway.server:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    environment:
      MULLU_ENV: pilot
      MULLU_DB_BACKEND: postgresql
      MULLU_DB_URL: "postgresql://mullu:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/mullu"
      MULLU_LLM_BACKEND: stub
      MULLU_PII_SCAN: "true"
      # Channel credentials (set in .env):
      # WHATSAPP_PHONE_NUMBER_ID: ""
      # WHATSAPP_ACCESS_TOKEN: ""
      # WHATSAPP_VERIFY_TOKEN: ""
      # WHATSAPP_APP_SECRET: ""
      # TELEGRAM_BOT_TOKEN: ""
      # SLACK_BOT_TOKEN: ""
      # SLACK_SIGNING_SECRET: ""
      # DISCORD_BOT_TOKEN: ""
      # DISCORD_PUBLIC_KEY: ""
    depends_on:
      mullu:
        condition: service_healthy
    networks:
      - mullu-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  pgdata:
  state-data:
