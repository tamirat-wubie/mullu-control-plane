apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mullu-gateway
  namespace: mullu
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - gateway.example.com
      secretName: mullu-gateway-tls
  rules:
    - host: gateway.example.com
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: mullu-gateway
                port:
                  number: 80
          - path: /gateway/witness
            pathType: Exact
            backend:
              service:
                name: mullu-gateway
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mullu-gateway
                port:
                  number: 80
