apiVersion: v1
kind: ConfigMap
metadata:
  name: mullu-config
  namespace: mullu
data:
  MULLU_ENV: "production"
  MULLU_DB_BACKEND: "postgresql"
  MULLU_LLM_BACKEND: "anthropic"
  MULLU_LLM_MODEL: "claude-sonnet-4-20250514"
  MULLU_CERT_INTERVAL: "300"
  MULLU_CERT_ENABLED: "true"
  MULLU_CORS_ORIGINS: ""  # Set to production frontend URL
  MULLU_STATE_DIR: "/data/state"
  MULLU_PII_SCAN: "true"
  MULLU_JWT_ISSUER: "mullu"
  MULLU_JWT_AUDIENCE: "mullu-api"
---
apiVersion: v1
kind: Secret
metadata:
  name: mullu-secrets
  namespace: mullu
type: Opaque
stringData:
  MULLU_DB_URL: ""  # Set via: kubectl create secret generic mullu-secrets --from-literal=MULLU_DB_URL=postgresql://...
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  MULLU_JWT_SECRET: ""  # base64-encoded 32-byte key — set via kubectl create secret
  MULLU_ENCRYPTION_KEY: ""  # base64-encoded 32-byte AES key — set via kubectl create secret
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mullu-state-pvc
  namespace: mullu
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  # storageClassName: encrypted-gp3  # Uncomment for encrypted EBS/PD storage class
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mullu-api
  namespace: mullu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mullu-api
  template:
    metadata:
      labels:
        app: mullu-api
        governed: "true"
    spec:
      containers:
        - name: mullu-api
          image: mullu-control-plane:latest  # Pin to specific tag in production
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mullu-config
            - secretRef:
                name: mullu-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: state-data
              mountPath: /data/state
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: state-data
          persistentVolumeClaim:
            claimName: mullu-state-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mullu-api
  namespace: mullu
spec:
  selector:
    app: mullu-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mullu-api-hpa
  namespace: mullu
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mullu-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ── Gateway Deployment ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mullu-gateway
  namespace: mullu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mullu-gateway
  template:
    metadata:
      labels:
        app: mullu-gateway
        governed: "true"
    spec:
      containers:
        - name: mullu-gateway
          image: mullu-control-plane:latest
          command: ["python", "-m", "uvicorn", "gateway.server:app", "--host", "0.0.0.0", "--port", "8001"]
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: mullu-config
            - secretRef:
                name: mullu-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mullu-gateway
  namespace: mullu
spec:
  selector:
    app: mullu-gateway
  ports:
    - port: 80
      targetPort: 8001
  type: ClusterIP
