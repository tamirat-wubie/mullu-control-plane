name: OpenAPI Export Witness

on:
  pull_request:
    paths:
      - ".github/workflows/openapi-export-witness.yml"
      - "mcoi/**"
      - "scripts/export_openapi.py"
      - "tests/test_sdk_generation.py"
      - "sdk/openapi/mullu.openapi.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-openapi-witness:
    name: Export OpenAPI witness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "fastapi" "uvicorn" "pydantic" "pydantic-settings" "python-multipart" "httpx"
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f mcoi/requirements.txt ]; then python -m pip install -r mcoi/requirements.txt; fi

      - name: Export runtime OpenAPI spec
        env:
          PYTHONPATH: mcoi
          MULLU_ENV: local_dev
          MULLU_DB_BACKEND: memory
          MULLU_CERT_ENABLED: "true"
          MULLU_CERT_INTERVAL: "0"
        run: |
          mkdir -p .change_assurance/openapi-export-witness
          python - <<'PY'
          import json
          import traceback
          from pathlib import Path

          output = Path('.change_assurance/openapi-export-witness/mullu.openapi.json')
          diagnostic = Path('.change_assurance/openapi-export-witness/export-diagnostic.json')
          try:
              from scripts.export_openapi import export_openapi

              spec = export_openapi(output)
              diagnostic.write_text(
                  json.dumps(
                      {
                          'governed': True,
                          'exported': True,
                          'output': str(output),
                          'path_count': len(spec.get('paths', {})),
                      },
                      sort_keys=True,
                  ) + '\n',
                  encoding='utf-8',
              )
          except Exception as exc:
              diagnostic.write_text(
                  json.dumps(
                      {
                          'governed': True,
                          'exported': False,
                          'error_type': type(exc).__name__,
                          'error': str(exc),
                          'traceback': traceback.format_exc(),
                      },
                      sort_keys=True,
                  ) + '\n',
                  encoding='utf-8',
              )
              raise
          PY

      - name: Verify dashboard route in exported spec
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('.change_assurance/openapi-export-witness/mullu.openapi.json')
          spec = json.loads(path.read_text(encoding='utf-8'))
          route = '/api/v1/personal-assistant/work-assistant/dashboard/read-model'
          assert route in spec.get('paths', {}), f'missing route: {route}'
          operation = spec['paths'][route].get('get', {})
          assert operation, f'missing GET operation for {route}'
          print(json.dumps({
              'governed': True,
              'route': route,
              'path_count': len(spec.get('paths', {})),
              'operation_id': operation.get('operationId', ''),
          }, sort_keys=True))
          PY

      - name: Upload OpenAPI witness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-export-witness
          path: |
            .change_assurance/openapi-export-witness/mullu.openapi.json
            .change_assurance/openapi-export-witness/export-diagnostic.json
          if-no-files-found: warn
