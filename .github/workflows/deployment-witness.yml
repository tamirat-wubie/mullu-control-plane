name: Deployment Witness Collection

on:
  workflow_dispatch:
    inputs:
      gateway_url:
        description: "Gateway base URL, for example https://gateway.example.com"
        required: true
        type: string
      expected_environment:
        description: "Expected runtime environment reported by /gateway/witness"
        required: true
        default: "pilot"
        type: choice
        options:
          - pilot
          - production
      operator_approval_ref:
        description: "Approval reference required to apply public health declaration"
        required: false
        default: ""
        type: string
      governed_swarm_pilot_readiness_path:
        description: "Pilot readiness JSON used as the governed swarm production prerequisite"
        required: false
        default: "docs/governed-swarm-promotion-readiness-example.json"
        type: string

# v4.22.0: opt into Node.js 24 for the deprecated actions/* runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect-deployment-witness:
    name: Collect Deployment Witness
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Preflight deployment witness runtime inputs
        env:
          MULLU_GATEWAY_URL: ${{ inputs.gateway_url }}
          MULLU_EXPECTED_RUNTIME_ENV: ${{ inputs.expected_environment }}
          MULLU_RUNTIME_WITNESS_SECRET: ${{ secrets.MULLU_RUNTIME_WITNESS_SECRET }}
          MULLU_RUNTIME_CONFORMANCE_SECRET: ${{ secrets.MULLU_RUNTIME_CONFORMANCE_SECRET }}
          MULLU_DEPLOYMENT_WITNESS_SECRET: ${{ secrets.MULLU_DEPLOYMENT_WITNESS_SECRET }}
        run: |
          python scripts/preflight_deployment_witness.py \
            --gateway-url "${{ inputs.gateway_url }}" \
            --expected-environment "${{ inputs.expected_environment }}" \
            --accept-repository-input-env \
            --accept-runtime-secret-env \
            --accept-conformance-secret-env \
            --accept-deployment-witness-secret-env \
            --accept-workflow-file \
            --output .change_assurance/deployment_witness_preflight.json

      - name: Collect live runtime conformance
        env:
          MULLU_RUNTIME_CONFORMANCE_SECRET: ${{ secrets.MULLU_RUNTIME_CONFORMANCE_SECRET }}
          MULLU_AUTHORITY_OPERATOR_SECRET: ${{ secrets.MULLU_AUTHORITY_OPERATOR_SECRET }}
        run: |
          python scripts/collect_runtime_conformance.py \
            --gateway-url "${{ inputs.gateway_url }}" \
            --conformance-secret "$MULLU_RUNTIME_CONFORMANCE_SECRET" \
            --authority-operator-secret "$MULLU_AUTHORITY_OPERATOR_SECRET" \
            --expected-environment "${{ inputs.expected_environment }}" \
            --output .change_assurance/runtime_conformance_certificate.json

      - name: Upload runtime conformance collection
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: runtime-conformance-collection
          path: .change_assurance/runtime_conformance_certificate.json
          if-no-files-found: warn

      - name: Collect live deployment witness
        env:
          MULLU_RUNTIME_WITNESS_SECRET: ${{ secrets.MULLU_RUNTIME_WITNESS_SECRET }}
          MULLU_RUNTIME_CONFORMANCE_SECRET: ${{ secrets.MULLU_RUNTIME_CONFORMANCE_SECRET }}
          MULLU_DEPLOYMENT_WITNESS_SECRET: ${{ secrets.MULLU_DEPLOYMENT_WITNESS_SECRET }}
        run: |
          python scripts/collect_deployment_witness.py \
            --gateway-url "${{ inputs.gateway_url }}" \
            --witness-secret "$MULLU_RUNTIME_WITNESS_SECRET" \
            --conformance-secret "$MULLU_RUNTIME_CONFORMANCE_SECRET" \
            --deployment-witness-secret "$MULLU_DEPLOYMENT_WITNESS_SECRET" \
            --expected-environment "${{ inputs.expected_environment }}" \
            --require-production-evidence \
            --output .change_assurance/deployment_witness.json

      - name: Apply public production health declaration
        if: ${{ inputs.operator_approval_ref != '' }}
        run: |
          python scripts/apply_deployment_publication_status.py \
            --operator-approval-ref "${{ inputs.operator_approval_ref }}" \
            --receipt-output .change_assurance/public_production_health_declaration.json
          python scripts/validate_deployment_publication_closure.py \
            --declaration-receipt .change_assurance/public_production_health_declaration.json \
            --output .change_assurance/deployment_publication_closure_validation.json

      - name: Validate governed swarm live production readiness
        if: ${{ inputs.expected_environment == 'production' && inputs.operator_approval_ref != '' }}
        run: |
          python scripts/validate_governed_swarm_production_readiness.py \
            --pilot-readiness "${{ inputs.governed_swarm_pilot_readiness_path }}" \
            --deployment-witness .change_assurance/deployment_witness.json \
            --public-health-declaration .change_assurance/public_production_health_declaration.json \
            --output .change_assurance/governed_swarm_production_readiness.json \
            --strict

      - name: Upload deployment witness preflight
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-witness-preflight
          path: .change_assurance/deployment_witness_preflight.json
          if-no-files-found: warn

      - name: Upload deployment witness
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-witness
          path: .change_assurance/deployment_witness.json
          if-no-files-found: error

      - name: Upload public production health declaration
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: public-production-health-declaration
          path: |
            .change_assurance/public_production_health_declaration.json
            .change_assurance/deployment_publication_closure_validation.json
          if-no-files-found: warn

      - name: Upload governed swarm production readiness
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: governed-swarm-production-readiness
          path: .change_assurance/governed_swarm_production_readiness.json
          if-no-files-found: warn
