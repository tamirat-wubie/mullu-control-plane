name: CI - Build Verification

on:
  push:
    branches: [main, "codex/*", "phase-*", "maf/*", "mcoi/*", "infra/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# v4.22.0: opt into Node.js 24 for the deprecated actions/* runtime.
# Silences the deprecation warning that fires on every job until
# Node.js 24 becomes default (June 2026).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-tests:
    name: Python Tests (MCOI shard ${{ matrix.mcoi-shard }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mcoi-shard:
          - intent_substrate
          - a-c
          - d
          - e
          - f
          - g
          - h
          - i
          - j
          - k
          - l
          - m
          - n
          - o
          - pa-pe
          - ph-pl
          - po
          - pr
          - pu
          - q
          - r
          - s
          - t
          - u
          - v
          - w
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2

      - name: Install dependencies
        timeout-minutes: 15
        run: python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e ".[dev]"

      - name: Run MCOI shard
        run: python ../scripts/run_mcoi_shards.py --shard "${{ matrix.mcoi-shard }}"

  python-compatibility:
    name: Python Compatibility (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.12"
            mcoi-shard: n
          - os: windows-2025-vs2026
            python-version: "3.13"
            mcoi-shard: n
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2

      - name: Install dependencies
        timeout-minutes: 15
        run: python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e ".[dev]"

      - name: Run compatibility shard
        run: python ../scripts/run_mcoi_shards.py --shard "${{ matrix.mcoi-shard }}"

  python-soak-tests:
    name: Python Soak Tests (ubuntu-24.04, Python 3.13)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2

      - name: Install dependencies
        timeout-minutes: 15
        run: python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e ".[dev]"

      - name: Run soak tests
        run: python ../scripts/run_mcoi_shards.py --soak-only

  python-required-status:
    # Keep this context stable: ruleset `main-protection` requires it.
    name: Python Tests (ubuntu-latest, Python 3.13)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [python-tests, python-compatibility, python-soak-tests]
    if: always()
    steps:
      - name: Confirm bounded Python gates passed
        run: |
          test "${{ needs.python-tests.result }}" = "success"
          test "${{ needs.python-compatibility.result }}" = "success"
          test "${{ needs.python-soak-tests.result }}" = "success"

  typescript-sdk:
    name: TypeScript SDK Verification
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify SDK package surface
        run: npm run verify

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: maf/rust
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            maf/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('maf/rust/Cargo.toml', 'maf/rust/crates/**/Cargo.toml') }}

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Validate schemas
        run: python scripts/validate_schemas.py

      - name: Validate protocol manifest
        run: python scripts/validate_protocol_manifest.py

      - name: Validate personal-assistant foundation
        run: |
          python scripts/validate_personal_assistant_skill_registry.py
          python scripts/validate_personal_assistant_approval_matrix.py
          python scripts/validate_personal_assistant_receipt.py
          python scripts/validate_personal_assistant_receipt.py --receipt examples/personal_assistant_receipt_math_reasoning.json
          python scripts/validate_personal_assistant_read_only_projection.py
          python scripts/validate_personal_assistant_draft_projection.py
          python scripts/validate_personal_assistant_approval_decision.py
          python scripts/validate_personal_assistant_memory_review.py
          python scripts/validate_personal_assistant_teamops_projection.py
          python scripts/validate_personal_assistant_github_codex_projection.py
          python scripts/validate_personal_assistant_research_projection.py
          python scripts/validate_personal_assistant_math_projection.py
          python scripts/validate_personal_assistant_planning_projection.py
          python scripts/validate_personal_assistant_public_console_probe_receipt.py --receipt examples/personal_assistant_public_console_probe_receipt.json --require-closed
          python scripts/validate_personal_assistant_component_witness_receipt.py --receipt examples/personal_assistant_component_witness_receipt.json --require-closed
          python scripts/validate_personal_assistant_foundation_evidence_receipt.py --receipt examples/personal_assistant_foundation_evidence_receipt.json --require-closed
          python scripts/validate_personal_assistant_readiness_index_receipt.py --receipt examples/personal_assistant_readiness_index_receipt.json --require-closed
          python scripts/validate_personal_assistant_coherence_ledger_receipt.py --receipt examples/personal_assistant_coherence_ledger_receipt.json --require-closed
          python scripts/validate_personal_assistant_authority_coverage_receipt.py --receipt examples/personal_assistant_authority_coverage_receipt.json --require-closed
          python scripts/validate_personal_assistant_capsule_alignment_receipt.py --receipt examples/personal_assistant_capsule_alignment_receipt.json --require-closed
          python scripts/validate_personal_assistant_policy_matrix_receipt.py --receipt examples/personal_assistant_policy_matrix_receipt.json --require-closed
          python scripts/validate_personal_assistant_runtime_boundary_receipt.py --receipt examples/personal_assistant_runtime_boundary_receipt.json --require-closed
          python scripts/validate_personal_assistant_foundation_closure_packet.py --packet examples/personal_assistant_foundation_closure_packet.json --require-closed
          python -m pytest tests/test_personal_assistant_skill_registry.py tests/test_validate_assistant_profile_registry.py tests/test_personal_assistant_runtime_skill_registry.py tests/test_personal_assistant_capability_pack_runtime.py tests/test_personal_assistant_intake.py tests/test_personal_assistant_read_only.py tests/test_validate_personal_assistant_read_only_projection.py tests/test_personal_assistant_drafts.py tests/test_validate_personal_assistant_draft_projection.py tests/test_personal_assistant_approval.py tests/test_personal_assistant_approval_matrix_runtime.py tests/test_personal_assistant_approval_queue.py tests/test_validate_personal_assistant_approval_decision.py tests/test_validate_personal_assistant_approval_review_packet.py tests/test_personal_assistant_receipts.py tests/test_personal_assistant_memory.py tests/test_personal_assistant_memory_runtime.py tests/test_validate_personal_assistant_memory_review.py tests/test_validate_personal_assistant_teamops_projection.py tests/test_validate_personal_assistant_github_codex_projection.py tests/test_validate_personal_assistant_research_projection.py tests/test_validate_personal_assistant_math_projection.py tests/test_validate_personal_assistant_planning_projection.py tests/test_personal_assistant_teamops.py tests/test_personal_assistant_console.py tests/test_validate_personal_assistant_console_read_model.py tests/test_personal_assistant_planner.py tests/test_collect_personal_assistant_public_console_probe.py tests/test_validate_personal_assistant_public_console_probe_receipt.py tests/test_collect_personal_assistant_component_witness.py tests/test_validate_personal_assistant_component_witness_receipt.py tests/test_collect_personal_assistant_foundation_evidence.py tests/test_validate_personal_assistant_foundation_evidence_receipt.py tests/test_collect_personal_assistant_readiness_index.py tests/test_validate_personal_assistant_readiness_index_receipt.py tests/test_collect_personal_assistant_coherence_ledger.py tests/test_validate_personal_assistant_coherence_ledger_receipt.py tests/test_collect_personal_assistant_authority_coverage.py tests/test_validate_personal_assistant_authority_coverage_receipt.py tests/test_collect_personal_assistant_capsule_alignment.py tests/test_validate_personal_assistant_capsule_alignment_receipt.py tests/test_collect_personal_assistant_policy_matrix.py tests/test_validate_personal_assistant_policy_matrix_receipt.py tests/test_collect_personal_assistant_runtime_boundary.py tests/test_validate_personal_assistant_runtime_boundary_receipt.py tests/test_collect_personal_assistant_foundation_closure_packet.py tests/test_validate_personal_assistant_foundation_closure_packet.py -q

      - name: Validate logic governance application
        run: python scripts/validate_logic_governance_application.py

      - name: Validate Life-Meaning Governance
        run: python scripts/validate_life_meaning_governance.py

      - name: Validate proof coverage matrix
        run: |
          python scripts/validate_worker_receipt_ledger_read_model.py
          python scripts/validate_readiness_waiver_review_packet.py
          python scripts/validate_browser_observation_receipt.py
          python scripts/validate_trusted_capture_evidence_packet.py
          python scripts/validate_sccml_trace_adapter_witness.py
          python scripts/validate_resilience_rehearsal_reports.py
          python scripts/validate_chaos_rehearsal_execution_report.py
          python scripts/validate_invariant_fuzz_execution_report.py
          python scripts/validate_maf_receipt_parity_witness.py
          python scripts/validate_maf_abi_cli_contract_witness.py
          python scripts/validate_maf_subprocess_effect_boundary_witness.py
          python scripts/validate_maf_deterministic_fixture_parity_witness.py
          python scripts/validate_maf_failure_receipt_path_witness.py
          python scripts/validate_maf_runtime_binding_admission_witness.py
          python scripts/validate_world_substrate_replay_witness.py
          python scripts/validate_research_source_conflict_map.py
          python scripts/validate_mfidel_substrate_conformance_receipt.py
          python -m scripts.proof_coverage_matrix --check

      - name: Validate terminal closure certificate
        run: python scripts/validate_terminal_closure_certificate.py --json

      - name: Validate shipped artifacts
        run: python scripts/validate_artifacts.py

      - name: Test Universal Evidence Graph schema contract
        run: python -m pytest tests/test_universal_evidence_graph_schema.py -q

      - name: Test Symbolic Simulation Engine schema contract
        run: python -m pytest tests/test_symbolic_simulation_engine_schema.py -q

      - name: Test Universal State Engine schema contract
        run: python -m pytest tests/test_universal_state_engine_schema.py -q

      - name: Test Universal Symbol kernel contract
        run: python -m pytest tests/test_validate_universal_symbol_kernel.py tests/test_validate_universal_symbol_receipt_store_lifecycle_evidence_receipt.py -q

      - name: Test SNet mesh receipt contract
        run: python -m pytest tests/test_validate_snet_mesh_receipt.py -q

      - name: Test SNet operator read model contract
        run: python -m pytest tests/test_validate_snet_operator_read_model.py -q

      - name: Test SNet episode replay contract
        run: python -m pytest tests/test_validate_snet_episode_replay.py -q

      - name: Validate doc/code consistency (anti-fabrication gate)
        run: python scripts/validate_doc_code_consistency.py

      - name: Validate public repository surface
        run: python scripts/validate_public_repository_surface.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate proprietary boundary
        run: python scripts/validate_proprietary_boundary.py

      - name: Validate tenant-scope coverage (cross-tenant IDOR guard)
        run: python scripts/validate_tenant_scope_coverage.py

      - name: Validate persistence tenant-guard coverage (defense-in-depth)
        run: python scripts/validate_persistence_tenant_guard_coverage.py

      - name: Validate deployment publication closure
        run: |
          mkdir -p .change_assurance
          test -f schemas/deployment_publication_closure_validation.schema.json
          python scripts/validate_deployment_publication_closure.py --output .change_assurance/deployment_publication_closure_validation.json

      - name: Upload deployment publication closure validation
        uses: actions/upload-artifact@v6
        with:
          name: deployment-publication-closure-validation
          path: .change_assurance/deployment_publication_closure_validation.json

      - name: Validate Reflex deployment witness replay
        run: |
          mkdir -p .change_assurance
          test -f schemas/reflex_deployment_witness_validator_receipt.schema.json
          python -m pytest tests/test_validate_reflex_deployment_witness.py -q --junitxml=.change_assurance/reflex_deployment_witness_validator_junit.xml
          python scripts/emit_reflex_deployment_witness_validator_receipt.py --junit .change_assurance/reflex_deployment_witness_validator_junit.xml --output .change_assurance/reflex_deployment_witness_validator_receipt.json --json

      - name: Upload Reflex deployment witness validator receipt
        uses: actions/upload-artifact@v6
        with:
          name: reflex-deployment-witness-validator-receipt
          path: |
            .change_assurance/reflex_deployment_witness_validator_junit.xml
            .change_assurance/reflex_deployment_witness_validator_receipt.json

      - name: Validate general-agent promotion closure plan
        run: |
          python scripts/validate_general_agent_promotion_operator_checklist.py --checklist examples/general_agent_promotion_operator_checklist.json --json
          python scripts/validate_general_agent_promotion_environment_bindings.py --contract examples/general_agent_promotion_environment_bindings.json --json
          MULLU_BROWSER_SANDBOX_EVIDENCE=ci-placeholder MULLU_VOICE_PROBE_AUDIO=ci-placeholder OPENAI_API_KEY=ci-placeholder EMAIL_CALENDAR_CONNECTOR_TOKEN=ci-placeholder MULLU_GATEWAY_URL=ci-placeholder MULLU_RUNTIME_WITNESS_SECRET=ci-placeholder MULLU_RUNTIME_CONFORMANCE_SECRET=ci-placeholder MULLU_DEPLOYMENT_WITNESS_SECRET=ci-placeholder MULLU_AUTHORITY_OPERATOR_SECRET=ci-placeholder python scripts/emit_general_agent_promotion_environment_binding_receipt.py --output .change_assurance/general_agent_promotion_environment_binding_receipt.json --json
          python scripts/validate_general_agent_promotion_environment_binding_receipt.py --receipt .change_assurance/general_agent_promotion_environment_binding_receipt.json --require-ready --json
          cp examples/capability_adapter_evidence_live_closed_20260611.json .change_assurance/capability_adapter_evidence.json
          python scripts/validate_general_agent_promotion.py --output .change_assurance/general_agent_promotion_readiness.json
          python scripts/validate_governed_runtime_promotion.py --output .change_assurance/governed_runtime_promotion_readiness.json
          python scripts/validate_governed_planning_profile_runtime_authorization_request.py
          python scripts/validate_governed_swarm_promotion_readiness.py --staging-evidence-bundle docs/governed-swarm-staging-evidence-bundle-example.json --target-environment pilot --output .change_assurance/governed_swarm_promotion_readiness.json --strict
          python scripts/validate_governed_swarm_production_readiness.py --pilot-readiness docs/governed-swarm-promotion-readiness-example.json --deployment-witness docs/governed-swarm-production-deployment-witness-example.json --public-health-declaration docs/governed-swarm-public-production-health-declaration-example.json --output .change_assurance/governed_swarm_production_readiness.json --strict
          python scripts/produce_capability_improvement_portfolio.py --output .change_assurance/capability_improvement_portfolio.json --json --strict
          python scripts/plan_capability_adapter_closure.py --output .change_assurance/capability_adapter_closure_plan.json
          python scripts/validate_capability_adapter_closure_plan_schema.py --output .change_assurance/capability_adapter_closure_plan_schema_validation.json --strict
          python scripts/emit_deployment_upstream_blocker_receipt.py --target-gateway-url https://api.mullusi.com --output .change_assurance/deployment_upstream_blocker_receipt.json --json || test -f .change_assurance/deployment_upstream_blocker_receipt.json
          python scripts/plan_deployment_publication_closure.py --output .change_assurance/deployment_publication_closure_plan.json
          python scripts/validate_deployment_publication_closure_plan_schema.py --output .change_assurance/deployment_publication_closure_plan_schema_validation.json --strict
          python scripts/plan_general_agent_promotion_closure.py --portfolio-plan .change_assurance/capability_improvement_portfolio.json --output .change_assurance/general_agent_promotion_closure_plan.json
          python scripts/validate_general_agent_promotion_closure_plan_schema.py --output .change_assurance/general_agent_promotion_closure_plan_schema_validation.json --strict
          python scripts/validate_general_agent_promotion_closure_plan.py --portfolio-plan .change_assurance/capability_improvement_portfolio.json --output .change_assurance/general_agent_promotion_closure_plan_validation.json --strict
          python scripts/validate_general_agent_promotion_handoff_packet.py --packet examples/general_agent_promotion_handoff_packet.json --json
          MULLU_BROWSER_SANDBOX_EVIDENCE=ci-placeholder MULLU_VOICE_PROBE_AUDIO=ci-placeholder OPENAI_API_KEY=ci-placeholder EMAIL_CALENDAR_CONNECTOR_TOKEN=ci-placeholder MULLU_GATEWAY_URL=ci-placeholder MULLU_RUNTIME_WITNESS_SECRET=ci-placeholder MULLU_RUNTIME_CONFORMANCE_SECRET=ci-placeholder MULLU_DEPLOYMENT_WITNESS_SECRET=ci-placeholder MULLU_AUTHORITY_OPERATOR_SECRET=ci-placeholder python scripts/preflight_general_agent_promotion_handoff.py --output .change_assurance/general_agent_promotion_handoff_preflight.json --strict --json
          python scripts/validate_general_agent_promotion_handoff_preflight.py --report .change_assurance/general_agent_promotion_handoff_preflight.json --require-ready --json

      - name: Validate MIL audit runbook workflow
        run: |
          python scripts/validate_mil_audit_runbook_operator_checklist.py --checklist examples/mil_audit_runbook_operator_checklist.json --json
          python -m pytest tests/test_preflight_mil_audit_runbook_workflow.py tests/test_validate_mil_audit_runbook_operator_checklist.py -q

      - name: Validate public naming readiness
        run: python scripts/validate_public_naming_readiness.py

      - name: Test public naming readiness
        run: python -m pytest tests/test_public_naming_readiness.py -q

      - name: Validate release status
        run: python scripts/validate_release_status.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

  sdlc-governance-gate:
    # Keep this context stable: ruleset `main-protection` can require it directly.
    name: SDLC Governance Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Validate SDLC artifacts and examples
        run: python scripts/validate_sdlc_artifact.py --receipt-path .change_assurance/sdlc_artifact_validation_receipt.json

      - name: Validate SDLC route fixtures
        run: python scripts/validate_sdlc_route.py

      - name: Validate intelligence coordination episode receipt
        run: python scripts/validate_intelligence_coordination_episode_receipt.py

      - name: Validate engineering puzzle universality witness
        run: python scripts/validate_engineering_puzzle_universality_witness.py --output .change_assurance/engineering_puzzle_universality_witness.json

      - name: Validate SDLC state machine
        run: python scripts/validate_sdlc_state_machine.py

      - name: Validate SDLC release readiness
        run: python scripts/validate_sdlc_release_readiness.py --strict

      - name: Validate SDLC security review
        run: python scripts/validate_sdlc_security_review.py --strict

      - name: Validate durable Gmail connector runtime plan
        run: |
          export MULLU_VALIDATION_TIMESTAMP="$(python -c 'from datetime import UTC, datetime; print(datetime.now(UTC).isoformat().replace("+00:00", "Z"))')"
          python scripts/validate_durable_gmail_connector_runtime_plan.py
          python scripts/emit_durable_gmail_account_binding_operator_input_request.py --output .change_assurance/durable_gmail_account_binding_operator_input_request.json --json
          python scripts/validate_durable_gmail_account_binding_operator_input_request.py --request .change_assurance/durable_gmail_account_binding_operator_input_request.json --require-blocked --json
          python scripts/produce_durable_gmail_revocation_recovery_rehearsal_receipt.py --output .change_assurance/durable_gmail_revocation_recovery_rehearsal_receipt.json --strict --json
          python scripts/validate_durable_gmail_revocation_recovery_rehearsal_receipt.py --receipt .change_assurance/durable_gmail_revocation_recovery_rehearsal_receipt.json --max-age-days 14 --require-ready --json
          python scripts/produce_durable_gmail_write_authority_rehearsal_receipt.py --output .change_assurance/durable_gmail_write_authority_rehearsal_receipt.json --strict --json
          python scripts/validate_durable_gmail_write_authority_rehearsal_receipt.py --receipt .change_assurance/durable_gmail_write_authority_rehearsal_receipt.json --max-age-days 14 --require-ready --json
          python scripts/emit_durable_gmail_live_write_operator_input_request.py --output .change_assurance/durable_gmail_live_write_operator_input_request.json --json
          python scripts/validate_durable_gmail_live_write_operator_input_request.py --request .change_assurance/durable_gmail_live_write_operator_input_request.json --require-blocked --json
          python scripts/validate_durable_gmail_oauth_runtime_preflight.py --json
          python scripts/validate_sdlc_security_review.py --review examples/sdlc/security_review_durable_gmail_connector_runtime_20260611.json --strict

      - name: Validate SDLC PR enforcement
        run: python scripts/validate_sdlc_pr_enforcement.py

      - name: Validate public demo surfaces
        run: python scripts/validate_public_demo_surfaces.py --output .change_assurance/public_demo_surface_validation.json

      - name: Run workspace governance preflight receipt
        run: |
          mkdir -p .tmp
          python scripts/run_workspace_governance_checks.py --json --receipt-path .tmp/workspace-governance-preflight-receipt.json > .tmp/workspace-governance-preflight-stdout.json
          python scripts/validate_workspace_governance_preflight_receipt.py --receipt .tmp/workspace-governance-preflight-receipt.json
          python - <<'PY'
          import json
          from pathlib import Path

          receipt_path = Path(".tmp/workspace-governance-preflight-receipt.json")
          receipt = json.loads(receipt_path.read_text(encoding="utf-8"))
          status = receipt.get("status")
          check_count = receipt.get("check_count")
          print(f"workspace governance preflight: status={status} checks={check_count}")
          if status != "passed":
              raise SystemExit(f"workspace governance preflight did not pass: {status}")
          PY
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Run Phi-GPS v3 platform spec tests
        run: python -m pytest tests/test_validate_phi_gps_v3_platform_spec.py -q

      - name: Run SDLC focused tests
