name: CI - Build Verification

on:
  push:
    branches: [main, "codex/*", "phase-*", "maf/*", "mcoi/*", "infra/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-tests:
    name: Python Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            run-soak: false
          - os: ubuntu-latest
            python-version: "3.13"
            run-soak: true
          - os: windows-latest
            python-version: "3.13"
            run-soak: false
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run main test suite
        run: python -m pytest --tb=short -q -m "not soak"

      - name: Run soak tests
        if: matrix.run-soak
        run: python -m pytest -m soak --tb=short -q

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: maf/rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            maf/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('maf/rust/Cargo.toml', 'maf/rust/crates/**/Cargo.toml') }}

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Validate schemas
        run: python scripts/validate_schemas.py

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [python-tests, rust-tests, schema-validation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Python build check
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]" && python -c "import mcoi_runtime; print('MCOI import OK')"

      - name: Rust build check
        working-directory: maf/rust
        run: cargo build --release

      - name: Contract-schema parity check
        run: python scripts/validate_schemas.py --strict

      - name: Print summary
        run: |
          echo "=== Build Verification Summary ==="
          echo "Python: OK"
          echo "Rust: OK"
          echo "Schemas: OK"
          echo "=================================="
