name: CI - Build Verification

on:
  push:
    branches: [main, "codex/*", "phase-*", "maf/*", "mcoi/*", "infra/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# v4.22.0: opt into Node.js 24 for the deprecated actions/* runtime.
# Silences the deprecation warning that fires on every job until
# Node.js 24 becomes default (June 2026).
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-tests:
    name: Python Tests (MCOI shard ${{ matrix.mcoi-shard }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mcoi-shard:
          - intent_substrate
          - a-c
          - d
          - e
          - f
          - g
          - h
          - i
          - j
          - k
          - l
          - m
          - n
          - o
          - pa-pe
          - ph-pl
          - po
          - pr
          - pu
          - q
          - r
          - s
          - t
          - u
          - v
          - w
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2

      - name: Install dependencies
        timeout-minutes: 15
        run: python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e ".[dev]"

      - name: Run MCOI shard
        run: python ../scripts/run_mcoi_shards.py --shard "${{ matrix.mcoi-shard }}"

  python-compatibility:
    name: Python Compatibility (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            python-version: "3.12"
            mcoi-shard: n
          - os: windows-2025-vs2026
            python-version: "3.13"
            mcoi-shard: n
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2

      - name: Install dependencies
        timeout-minutes: 15
        run: python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e ".[dev]"

      - name: Run compatibility shard
        run: python ../scripts/run_mcoi_shards.py --shard "${{ matrix.mcoi-shard }}"

  python-soak-tests:
    name: Python Soak Tests (ubuntu-24.04, Python 3.13)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade pip
        timeout-minutes: 5
        run: python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2

      - name: Install dependencies
        timeout-minutes: 15
        run: python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e ".[dev]"

      - name: Run soak tests
        run: python ../scripts/run_mcoi_shards.py --soak-only

  python-required-status:
    # Keep this context stable: ruleset `main-protection` requires it.
    name: Python Tests (ubuntu-latest, Python 3.13)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [python-tests, python-compatibility, python-soak-tests]
    if: always()
    steps:
      - name: Confirm bounded Python gates passed
        run: |
          test "${{ needs.python-tests.result }}" = "success"
          test "${{ needs.python-compatibility.result }}" = "success"
          test "${{ needs.python-soak-tests.result }}" = "success"

  typescript-sdk:
    name: TypeScript SDK Verification
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Verify SDK package surface
        run: npm run verify

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: maf/rust
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            maf/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('maf/rust/Cargo.toml', 'maf/rust/crates/**/Cargo.toml') }}

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Validate schemas
        run: python scripts/validate_schemas.py

      - name: Validate protocol manifest
        run: python scripts/validate_protocol_manifest.py

      - name: Validate logic governance application
        run: python scripts/validate_logic_governance_application.py

      - name: Validate proof coverage matrix
        run: python scripts/proof_coverage_matrix.py --check

      - name: Validate terminal closure certificate
        run: python scripts/validate_terminal_closure_certificate.py --json

      - name: Validate shipped artifacts
        run: python scripts/validate_artifacts.py

      - name: Test Universal Evidence Graph schema contract
        run: python -m pytest tests/test_universal_evidence_graph_schema.py -q

      - name: Validate doc/code consistency (anti-fabrication gate)
        run: python scripts/validate_doc_code_consistency.py

      - name: Validate public repository surface
        run: python scripts/validate_public_repository_surface.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate proprietary boundary
        run: python scripts/validate_proprietary_boundary.py

      - name: Validate tenant-scope coverage (cross-tenant IDOR guard)
        run: python scripts/validate_tenant_scope_coverage.py

      - name: Validate persistence tenant-guard coverage (defense-in-depth)
        run: python scripts/validate_persistence_tenant_guard_coverage.py

      - name: Validate deployment publication closure
        run: |
          mkdir -p .change_assurance
          test -f schemas/deployment_publication_closure_validation.schema.json
          python scripts/validate_deployment_publication_closure.py --output .change_assurance/deployment_publication_closure_validation.json

      - name: Upload deployment publication closure validation
        uses: actions/upload-artifact@v6
        with:
          name: deployment-publication-closure-validation
          path: .change_assurance/deployment_publication_closure_validation.json

      - name: Validate Reflex deployment witness replay
        run: |
          mkdir -p .change_assurance
          test -f schemas/reflex_deployment_witness_validator_receipt.schema.json
          python -m pytest tests/test_validate_reflex_deployment_witness.py -q --junitxml=.change_assurance/reflex_deployment_witness_validator_junit.xml
          python scripts/emit_reflex_deployment_witness_validator_receipt.py --junit .change_assurance/reflex_deployment_witness_validator_junit.xml --output .change_assurance/reflex_deployment_witness_validator_receipt.json --json

      - name: Upload Reflex deployment witness validator receipt
        uses: actions/upload-artifact@v6
        with:
          name: reflex-deployment-witness-validator-receipt
          path: |
            .change_assurance/reflex_deployment_witness_validator_junit.xml
            .change_assurance/reflex_deployment_witness_validator_receipt.json

      - name: Validate general-agent promotion closure plan
        run: |
          python scripts/validate_general_agent_promotion_operator_checklist.py --checklist examples/general_agent_promotion_operator_checklist.json --json
          python scripts/validate_general_agent_promotion_environment_bindings.py --contract examples/general_agent_promotion_environment_bindings.json --json
          MULLU_BROWSER_SANDBOX_EVIDENCE=ci-placeholder MULLU_VOICE_PROBE_AUDIO=ci-placeholder OPENAI_API_KEY=ci-placeholder EMAIL_CALENDAR_CONNECTOR_TOKEN=ci-placeholder MULLU_GATEWAY_URL=ci-placeholder MULLU_RUNTIME_WITNESS_SECRET=ci-placeholder MULLU_RUNTIME_CONFORMANCE_SECRET=ci-placeholder MULLU_DEPLOYMENT_WITNESS_SECRET=ci-placeholder MULLU_AUTHORITY_OPERATOR_SECRET=ci-placeholder python scripts/emit_general_agent_promotion_environment_binding_receipt.py --output .change_assurance/general_agent_promotion_environment_binding_receipt.json --json
          python scripts/validate_general_agent_promotion_environment_binding_receipt.py --receipt .change_assurance/general_agent_promotion_environment_binding_receipt.json --require-ready --json
          python scripts/collect_capability_adapter_evidence.py --output .change_assurance/capability_adapter_evidence.json
          python scripts/validate_general_agent_promotion.py --output .change_assurance/general_agent_promotion_readiness.json
          python scripts/validate_governed_runtime_promotion.py --output .change_assurance/governed_runtime_promotion_readiness.json
          python scripts/validate_governed_swarm_promotion_readiness.py --staging-evidence-bundle docs/governed-swarm-staging-evidence-bundle-example.json --target-environment pilot --output .change_assurance/governed_swarm_promotion_readiness.json --strict
          python scripts/validate_governed_swarm_production_readiness.py --pilot-readiness docs/governed-swarm-promotion-readiness-example.json --deployment-witness docs/governed-swarm-production-deployment-witness-example.json --public-health-declaration docs/governed-swarm-public-production-health-declaration-example.json --output .change_assurance/governed_swarm_production_readiness.json --strict
          python scripts/produce_capability_improvement_portfolio.py --output .change_assurance/capability_improvement_portfolio.json --json --strict
          python scripts/plan_capability_adapter_closure.py --output .change_assurance/capability_adapter_closure_plan.json
          python scripts/validate_capability_adapter_closure_plan_schema.py --output .change_assurance/capability_adapter_closure_plan_schema_validation.json --strict
          python scripts/plan_deployment_publication_closure.py --output .change_assurance/deployment_publication_closure_plan.json
          python scripts/validate_deployment_publication_closure_plan_schema.py --output .change_assurance/deployment_publication_closure_plan_schema_validation.json --strict
          python scripts/plan_general_agent_promotion_closure.py --portfolio-plan .change_assurance/capability_improvement_portfolio.json --output .change_assurance/general_agent_promotion_closure_plan.json
          python scripts/validate_general_agent_promotion_closure_plan_schema.py --output .change_assurance/general_agent_promotion_closure_plan_schema_validation.json --strict
          python scripts/validate_general_agent_promotion_closure_plan.py --portfolio-plan .change_assurance/capability_improvement_portfolio.json --output .change_assurance/general_agent_promotion_closure_plan_validation.json --strict
          python scripts/validate_general_agent_promotion_handoff_packet.py --packet examples/general_agent_promotion_handoff_packet.json --json
          MULLU_BROWSER_SANDBOX_EVIDENCE=ci-placeholder MULLU_VOICE_PROBE_AUDIO=ci-placeholder OPENAI_API_KEY=ci-placeholder EMAIL_CALENDAR_CONNECTOR_TOKEN=ci-placeholder MULLU_GATEWAY_URL=ci-placeholder MULLU_RUNTIME_WITNESS_SECRET=ci-placeholder MULLU_RUNTIME_CONFORMANCE_SECRET=ci-placeholder MULLU_DEPLOYMENT_WITNESS_SECRET=ci-placeholder MULLU_AUTHORITY_OPERATOR_SECRET=ci-placeholder python scripts/preflight_general_agent_promotion_handoff.py --output .change_assurance/general_agent_promotion_handoff_preflight.json --strict --json
          python scripts/validate_general_agent_promotion_handoff_preflight.py --report .change_assurance/general_agent_promotion_handoff_preflight.json --require-ready --json

      - name: Validate MIL audit runbook workflow
        run: |
          python scripts/validate_mil_audit_runbook_operator_checklist.py --checklist examples/mil_audit_runbook_operator_checklist.json --json
          python -m pytest tests/test_preflight_mil_audit_runbook_workflow.py tests/test_validate_mil_audit_runbook_operator_checklist.py -q

      - name: Validate public naming readiness
        run: python scripts/validate_public_naming_readiness.py

      - name: Test public naming readiness
        run: python -m pytest tests/test_public_naming_readiness.py -q

      - name: Validate release status
        run: python scripts/validate_release_status.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

  sdlc-governance-gate:
    # Keep this context stable: ruleset `main-protection` can require it directly.
    name: SDLC Governance Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Validate SDLC artifacts and examples
        run: python scripts/validate_sdlc_artifact.py --receipt-path .change_assurance/sdlc_artifact_validation_receipt.json

      - name: Validate SDLC route fixtures
        run: python scripts/validate_sdlc_route.py

      - name: Validate intelligence coordination episode receipt
        run: python scripts/validate_intelligence_coordination_episode_receipt.py

      - name: Validate engineering puzzle universality witness
        run: python scripts/validate_engineering_puzzle_universality_witness.py --output .change_assurance/engineering_puzzle_universality_witness.json

      - name: Validate SDLC state machine
        run: python scripts/validate_sdlc_state_machine.py

      - name: Validate SDLC release readiness
        run: python scripts/validate_sdlc_release_readiness.py --strict

      - name: Validate SDLC security review
        run: python scripts/validate_sdlc_security_review.py --strict

      - name: Validate SDLC PR enforcement
        run: python scripts/validate_sdlc_pr_enforcement.py

      - name: Validate public demo surfaces
        run: python scripts/validate_public_demo_surfaces.py --output .change_assurance/public_demo_surface_validation.json

      - name: Run workspace governance preflight receipt
        run: python scripts/run_workspace_governance_checks.py --json --receipt-path .tmp/workspace-governance-preflight-receipt.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}

      - name: Run SDLC focused tests
        run: python -m pytest tests/test_validate_sdlc_artifact.py tests/test_validate_sdlc_route.py tests/test_validate_intelligence_coordination_episode_receipt.py tests/test_validate_engineering_puzzle_universality_witness.py tests/test_musia_tier2_doc_status.py tests/test_cognitive_outcome_ledger_doc_status.py tests/test_inceptadive_note_memory_architecture_doc_status.py tests/test_temporal_scheduler_runbook_limits.py tests/test_collect_ldap_directory_export.py tests/test_validate_public_demo_surfaces.py tests/test_validate_sdlc_state_machine.py tests/test_validate_sdlc_release_readiness.py tests/test_sdlc_security_review.py tests/test_validate_sdlc_pr_enforcement.py tests/test_validate_foundation_agentic_management_boundary.py tests/test_validate_foundation_learning_path_boundary.py tests/test_validate_foundation_operator_readiness_boundary.py tests/test_validate_foundation_solo_daily_loop_boundary.py tests/test_validate_foundation_private_recovery_rehearsal_boundary.py tests/test_validate_foundation_support_triage_rehearsal_boundary.py tests/test_validate_foundation_intake_questionnaire_rehearsal_boundary.py tests/test_validate_foundation_customer_access_policy_rehearsal_boundary.py tests/test_validate_foundation_privacy_minimization_rehearsal_boundary.py tests/test_validate_foundation_legal_business_question_rehearsal_boundary.py tests/test_validate_foundation_funding_team_obligation_rehearsal_boundary.py tests/test_validate_foundation_community_network_no_outreach_rehearsal_boundary.py tests/test_validate_foundation_pilot_deferral_rehearsal_boundary.py tests/test_validate_foundation_reassessment_gate_boundary.py tests/test_validate_foundation_deployment_upstream_api_gate_rehearsal_boundary.py tests/test_validate_foundation_runtime_secret_handoff_rehearsal_boundary.py tests/test_validate_foundation_production_dependency_evidence_rehearsal_boundary.py tests/test_validate_foundation_external_evidence_acceptance_rehearsal_boundary.py tests/test_validate_foundation_gateway_dns_target_binding_rehearsal_boundary.py tests/test_validate_foundation_gateway_dns_publication_rehearsal_boundary.py tests/test_validate_foundation_gateway_dns_resolution_receipt_rehearsal_boundary.py tests/test_validate_foundation_gateway_endpoint_reachability_rehearsal_boundary.py tests/test_validate_foundation_gateway_endpoint_evidence_receipt_rehearsal_boundary.py tests/test_validate_foundation_public_health_declaration_rehearsal_boundary.py tests/test_validate_foundation_deployment_witness_input_boundary.py tests/test_validate_foundation_deployment_witness_preflight_rehearsal_boundary.py tests/test_validate_foundation_deployment_witness_dispatch_rehearsal_boundary.py tests/test_validate_foundation_deployment_witness_artifact_validation_rehearsal_boundary.py tests/test_validate_foundation_deployment_witness_evidence_handoff_boundary.py tests/test_validate_foundation_deployment_witness_evidence_ledger_routing_boundary.py tests/test_validate_foundation_evidence_ledger_boundary.py tests/test_validate_foundation_test_evidence_boundary.py tests/test_render_finance_approval_operator_page.py tests/test_collect_product_dashboard_production_prometheus_scrape_probe.py tests/test_product_dashboard_grafana_metric_emitter_receipt.py tests/test_product_dashboard_kpi_math_witness_map.py tests/test_product_dashboard_production_prometheus_scrape_probe_receipt.py tests/test_product_dashboard_prometheus_scrape_sample_receipt.py tests/test_validate_product_dashboard_production_prometheus_scrape_probe_receipt.py -q

      - name: Run Foundation validator tests
        run: python -m pytest tests/test_validate_foundation_mode.py tests/test_validate_foundation_local_proof_thread.py tests/test_validate_foundation_*_boundary.py -q

      - name: Run governed code-change loop tests
        run: python -m pytest tests/test_governed_code_change_loop.py tests/test_probe_governed_code_change_loop_sandbox.py tests/test_run_governed_code_change_loop_script.py tests/test_run_wsl_governed_code_change_loop_sandbox_probe.py tests/test_assess_windows_governed_code_change_loop_readiness.py tests/test_validate_governed_code_change_loop_receipt.py tests/test_validate_governed_code_change_loop_sandbox_probe.py tests/test_validate_governed_code_change_loop_sandbox_readiness_runbook.py -q

      - name: Run test-coverage contract tests
        # Enforce the test-execution coverage invariants in CI: the MCOI shard
        # inventory (every mcoi/tests file is in exactly one shard) and the
        # root tests/ coverage waiver (no new CI-invisible root test), plus
        # workspace preflight gating invariants for foundation boundaries and
        # full unsharded receipt generation.
        run: python -m pytest tests/test_run_mcoi_shards.py tests/test_root_test_coverage.py tests/test_run_workspace_governance_checks.py -q

      - name: Upload SDLC validation receipt
        uses: actions/upload-artifact@v6
        with:
          name: sdlc-artifact-validation-receipt
          path: .change_assurance/sdlc_artifact_validation_receipt.json

      - name: Upload public demo surface validation receipt
        uses: actions/upload-artifact@v6
        with:
          name: public-demo-surface-validation-receipt
          path: .change_assurance/public_demo_surface_validation.json

      - name: Upload SDLC workspace preflight receipt
        uses: actions/upload-artifact@v6
        with:
          name: sdlc-workspace-governance-preflight-receipt
          path: .tmp/workspace-governance-preflight-receipt.json

  gateway-closure:
    name: Gateway Closure and Witness Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Run gateway closure tests
        run: python -m pytest tests/test_gateway tests/test_pilot_proof_slice.py -q

      - name: Emit pilot proof-slice witness
        run: python scripts/pilot_proof_slice.py --output .change_assurance/pilot_proof_slice_witness.json

      - name: Validate gateway deployment environment
        run: python scripts/validate_gateway_deployment_env.py --strict

      - name: Validate gateway ingress manifest
        run: python scripts/validate_gateway_ingress_manifest.py --allow-placeholder

  reflective-contract-guard:
    name: Reflective Contract Guard
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate outward-facing contract strings
        run: python scripts/validate_reflective_contracts.py

  red-team-release-gate:
    name: Red-Team Release Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]"

      - name: Run deterministic red-team harness
        run: python scripts/run_red_team_harness.py --output .change_assurance/red_team_harness.json --min-pass-rate 1.0

      - name: Upload red-team harness witness
        uses: actions/upload-artifact@v6
        with:
          name: red-team-harness-witness
          path: .change_assurance/red_team_harness.json

  build-verification:
    name: Build Verification
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [python-required-status, typescript-sdk, rust-tests, schema-validation, sdlc-governance-gate, gateway-closure, reflective-contract-guard, red-team-release-gate]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Python build check
        run: python -m pip install --upgrade pip && python -m pip install -e "mcoi[dev]" && python -c "import mcoi_runtime; print('MCOI import OK')"

      - name: Rust build check
        working-directory: maf/rust
        run: cargo build --release

      - name: Contract-schema parity check
        run: python scripts/validate_schemas.py --strict

      - name: Protocol manifest check
        run: python scripts/validate_protocol_manifest.py

      - name: Proof coverage matrix check
        run: python scripts/proof_coverage_matrix.py --check

      - name: Artifact validation check
        run: python scripts/validate_artifacts.py --strict

      - name: Public naming readiness check
        run: python scripts/validate_public_naming_readiness.py

      - name: Public naming readiness tests
        run: python -m pytest tests/test_public_naming_readiness.py -q

      - name: Release status check
        run: python scripts/validate_release_status.py --strict

      - name: Public repository surface check
        run: python scripts/validate_public_repository_surface.py --local-only

      - name: Proprietary boundary check
        run: python scripts/validate_proprietary_boundary.py

      - name: Deployment publication closure check
        run: |
          mkdir -p .change_assurance
          python scripts/validate_deployment_publication_closure.py --output .change_assurance/deployment_publication_closure_validation.json

      - name: Upload build verification deployment publication closure validation
        uses: actions/upload-artifact@v6
        with:
          name: build-verification-deployment-publication-closure-validation
          path: .change_assurance/deployment_publication_closure_validation.json

      - name: General-agent promotion closure plan check
        run: |
          python scripts/validate_general_agent_promotion_operator_checklist.py --checklist examples/general_agent_promotion_operator_checklist.json --json
          python scripts/validate_general_agent_promotion_environment_bindings.py --contract examples/general_agent_promotion_environment_bindings.json --json
