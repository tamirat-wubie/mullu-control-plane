name: CI — Build Verification

on:
  push:
    branches: [main, "phase-*", "maf/*", "mcoi/*", "infra/*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Python (MCOI Runtime)
  # -----------------------------------------------------------------------
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    defaults:
      run:
        working-directory: mcoi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest --tb=short -q

      - name: Run soak tests
        run: python -m pytest -m soak --tb=short -q

  # -----------------------------------------------------------------------
  # Rust (MAF Substrate)
  # -----------------------------------------------------------------------
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: maf/rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            maf/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('maf/rust/Cargo.lock') }}

      - name: Run tests
        run: cargo test

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  # -----------------------------------------------------------------------
  # Schema Validation
  # -----------------------------------------------------------------------
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e "mcoi[dev]"

      - name: Validate schemas
        run: python scripts/validate_schemas.py

  # -----------------------------------------------------------------------
  # Build Verification
  # -----------------------------------------------------------------------
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [python-tests, rust-tests, schema-validation]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Python build check
        run: pip install -e "mcoi[dev]" && python -c "import mcoi_runtime; print('MCOI import OK')"

      - name: Rust build check
        working-directory: maf/rust
        run: cargo build --release

      - name: Contract-schema parity check
        run: python scripts/validate_schemas.py --strict

      - name: Print summary
        run: |
          echo "=== Build Verification Summary ==="
          echo "Python: OK"
          echo "Rust: OK"
          echo "Schemas: OK"
          echo "=================================="
