# Purpose: collect governed live evidence for browser, document, voice, and email/calendar adapters.
# Governance scope: [OCE, RAG, CDCV, CQTE, UWMA, PRS]
# Dependencies: GitHub Actions secrets, adapter live receipt producers, and MCOI runtime dependencies.
# Invariants: no secret values, raw voice audio, or browser screenshots are uploaded; failed probes remain explicit evidence.

name: Capability Adapter Live Evidence

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Adapter live evidence target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - browser
          - document
          - voice
          - email-calendar
      email_calendar_connector_id:
        description: "Read-only connector id for email/calendar probing"
        required: true
        default: "gmail"
        type: choice
        options:
          - gmail
          - google_calendar
          - microsoft_graph
      email_calendar_query:
        description: "Read-only email/calendar query"
        required: true
        default: "newer_than:1d"
        type: string
      browser_url:
        description: "First-party URL used for the browser live probe"
        required: true
        default: "https://api.mullusi.com/health"
        type: string
      voice_text:
        description: "Text used for the voice synthesis probe"
        required: true
        default: "Mullu governed voice adapter receipt."
        type: string
      strict:
        description: "Fail the workflow when requested live receipts fail"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MULLU_GATEWAY_URL: ${{ vars.MULLU_GATEWAY_URL }}
  MULLU_EXPECTED_RUNTIME_ENV: ${{ vars.MULLU_EXPECTED_RUNTIME_ENV }}
  MULLU_BROWSER_SANDBOX_EVIDENCE: .change_assurance/browser_sandbox_evidence.json

jobs:
  collect-adapter-live-evidence:
    name: Collect Adapter Live Evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        timeout-minutes: 10
        run: |
          python -m pip install --disable-pip-version-check --upgrade pip --timeout 60 --retries 2
          python -m pip install --disable-pip-version-check --timeout 60 --retries 2 -e "mcoi[dev,browser-worker,document-worker]" openai

      - name: Install browser runtime
        if: ${{ inputs.target == 'all' || inputs.target == 'browser' }}
        timeout-minutes: 10
        run: |
          python -m playwright install --with-deps chromium

      - name: Build sandbox probe image
        if: ${{ inputs.target == 'all' || inputs.target == 'browser' }}
        timeout-minutes: 5
        run: |
          set -euo pipefail
          cat > /tmp/mullu-agent-runner.Dockerfile <<'EOF'
          FROM python:3.13-slim
          RUN adduser --disabled-password --gecos "" nonroot
          USER nonroot
          EOF
          docker build -f /tmp/mullu-agent-runner.Dockerfile -t mullu-agent-runner:latest /tmp

      - name: Prepare approved voice probe audio
        if: ${{ inputs.target == 'all' || inputs.target == 'voice' }}
        env:
          MULLU_VOICE_PROBE_AUDIO_B64: ${{ secrets.MULLU_VOICE_PROBE_AUDIO_B64 }}
        run: |
          set -euo pipefail
          if [ -z "$MULLU_VOICE_PROBE_AUDIO_B64" ]; then
            echo "MULLU_VOICE_PROBE_AUDIO_B64 secret is required for voice live evidence"
            exit 1
          fi
          mkdir -p .change_assurance/private
          printf "%s" "$MULLU_VOICE_PROBE_AUDIO_B64" | base64 -d > .change_assurance/private/voice_probe_audio.wav
          chmod 600 .change_assurance/private/voice_probe_audio.wav
          echo "MULLU_VOICE_PROBE_AUDIO=.change_assurance/private/voice_probe_audio.wav" >> "$GITHUB_ENV"

      - name: Bind static email/calendar token fallback
        if: ${{ inputs.target == 'all' || inputs.target == 'email-calendar' }}
        env:
          EMAIL_CALENDAR_CONNECTOR_TOKEN_SECRET: ${{ secrets.EMAIL_CALENDAR_CONNECTOR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$EMAIL_CALENDAR_CONNECTOR_TOKEN_SECRET" ]; then
            echo "::add-mask::$EMAIL_CALENDAR_CONNECTOR_TOKEN_SECRET"
            printf "EMAIL_CALENDAR_CONNECTOR_TOKEN=%s\n" "$EMAIL_CALENDAR_CONNECTOR_TOKEN_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Mint durable Gmail OAuth access token
        if: ${{ always() && (inputs.target == 'all' || inputs.target == 'email-calendar') && inputs.email_calendar_connector_id == 'gmail' }}
        env:
          GMAIL_OAUTH_CLIENT_ID: ${{ secrets.GMAIL_OAUTH_CLIENT_ID }}
          GMAIL_OAUTH_CLIENT_SECRET: ${{ secrets.GMAIL_OAUTH_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          MULLU_GMAIL_OAUTH_CONSENT_WITNESS_REF: ${{ vars.MULLU_GMAIL_OAUTH_CONSENT_WITNESS_REF }}
          MULLU_GMAIL_OAUTH_CLIENT_WITNESS_REF: ${{ vars.MULLU_GMAIL_OAUTH_CLIENT_WITNESS_REF }}
          MULLU_GMAIL_LEAST_PRIVILEGE_SCOPE_RECEIPT_REF: ${{ vars.MULLU_GMAIL_LEAST_PRIVILEGE_SCOPE_RECEIPT_REF }}
          MULLU_GMAIL_REFRESH_TOKEN_STORAGE_RECEIPT_REF: ${{ vars.MULLU_GMAIL_REFRESH_TOKEN_STORAGE_RECEIPT_REF }}
          MULLU_GMAIL_REVOCATION_RECOVERY_RECEIPT_REF: ${{ vars.MULLU_GMAIL_REVOCATION_RECOVERY_RECEIPT_REF }}
        run: |
          set -euo pipefail
          if [ -n "$GMAIL_OAUTH_CLIENT_ID" ] && [ -n "$GMAIL_OAUTH_CLIENT_SECRET" ] && [ -n "$GMAIL_REFRESH_TOKEN" ]; then
            python scripts/mint_gmail_oauth_access_token.py \
              --output .change_assurance/gmail_oauth_refresh_receipt.json \
              --github-env "$GITHUB_ENV" \
              --strict \
              --json
          else
            echo "Durable Gmail OAuth secrets not configured; using static EMAIL_CALENDAR_CONNECTOR_TOKEN fallback when present."
          fi

      - name: Verify governed adapter secret bindings
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MULLU_RUNTIME_WITNESS_SECRET: ${{ secrets.MULLU_RUNTIME_WITNESS_SECRET }}
          MULLU_RUNTIME_CONFORMANCE_SECRET: ${{ secrets.MULLU_RUNTIME_CONFORMANCE_SECRET }}
          MULLU_DEPLOYMENT_WITNESS_SECRET: ${{ secrets.MULLU_DEPLOYMENT_WITNESS_SECRET }}
          MULLU_AUTHORITY_OPERATOR_SECRET: ${{ secrets.MULLU_AUTHORITY_OPERATOR_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          if [ "${{ inputs.target }}" = "all" ] || [ "${{ inputs.target }}" = "voice" ]; then
            [ -n "$OPENAI_API_KEY" ] || missing+=("OPENAI_API_KEY")
            [ -n "${MULLU_VOICE_PROBE_AUDIO:-}" ] || missing+=("MULLU_VOICE_PROBE_AUDIO")
          fi
          if [ "${{ inputs.target }}" = "all" ] || [ "${{ inputs.target }}" = "email-calendar" ]; then
            [ -n "$EMAIL_CALENDAR_CONNECTOR_TOKEN" ] || missing+=("EMAIL_CALENDAR_CONNECTOR_TOKEN")
          fi
          [ -n "$MULLU_AUTHORITY_OPERATOR_SECRET" ] || missing+=("MULLU_AUTHORITY_OPERATOR_SECRET")
          if [ "${#missing[@]}" -ne 0 ]; then
            printf "Missing governed bindings: %s\n" "${missing[*]}"
            exit 1
          fi

      - name: Emit redacted environment binding receipt
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MULLU_RUNTIME_WITNESS_SECRET: ${{ secrets.MULLU_RUNTIME_WITNESS_SECRET }}
          MULLU_RUNTIME_CONFORMANCE_SECRET: ${{ secrets.MULLU_RUNTIME_CONFORMANCE_SECRET }}
          MULLU_DEPLOYMENT_WITNESS_SECRET: ${{ secrets.MULLU_DEPLOYMENT_WITNESS_SECRET }}
          MULLU_AUTHORITY_OPERATOR_SECRET: ${{ secrets.MULLU_AUTHORITY_OPERATOR_SECRET }}
        run: |
          python scripts/emit_general_agent_promotion_environment_binding_receipt.py \
            --output .change_assurance/general_agent_promotion_environment_binding_receipt.json \
            --json
          python scripts/validate_general_agent_promotion_environment_binding_receipt.py \
            --receipt .change_assurance/general_agent_promotion_environment_binding_receipt.json \
            --json

      - name: Produce browser sandbox evidence
        if: ${{ inputs.target == 'all' || inputs.target == 'browser' }}
        run: |
          python scripts/produce_browser_sandbox_evidence.py \
            --output "$MULLU_BROWSER_SANDBOX_EVIDENCE" \
            --strict \
            --json
          python scripts/validate_sandbox_execution_receipt.py \
            --receipt "$MULLU_BROWSER_SANDBOX_EVIDENCE" \
            --capability-prefix browser. \
            --require-no-workspace-changes \
            --json
          python scripts/validate_browser_sandbox_evidence.py \
            --evidence "$MULLU_BROWSER_SANDBOX_EVIDENCE" \
            --json

      - name: Produce browser live receipt
        if: ${{ inputs.target == 'all' || inputs.target == 'browser' }}
        run: |
          args=(
            --target browser
            --browser-url "${{ inputs.browser_url }}"
            --browser-sandbox-evidence "$MULLU_BROWSER_SANDBOX_EVIDENCE"
            --json
          )
          if [ "${{ inputs.strict }}" = "true" ]; then
            args+=(--strict)
          fi
          python scripts/produce_capability_adapter_live_receipts.py "${args[@]}"

      - name: Produce document live receipt
        if: ${{ always() && (inputs.target == 'all' || inputs.target == 'document') }}
        run: |
          args=(
            --target document
            --json
          )
          if [ "${{ inputs.strict }}" = "true" ]; then
            args+=(--strict)
          fi
          python scripts/produce_capability_adapter_live_receipts.py "${args[@]}"

      - name: Produce voice live receipt
        if: ${{ always() && (inputs.target == 'all' || inputs.target == 'voice') }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          args=(
            --target voice
            --voice-audio-path "$MULLU_VOICE_PROBE_AUDIO"
            --voice-text "${{ inputs.voice_text }}"
            --json
          )
          if [ "${{ inputs.strict }}" = "true" ]; then
            args+=(--strict)
          fi
          python scripts/produce_capability_adapter_live_receipts.py "${args[@]}"

      - name: Produce email/calendar live receipt
        if: ${{ always() && (inputs.target == 'all' || inputs.target == 'email-calendar') }}
        env:
          EMAIL_CALENDAR_CONNECTOR_ID: ${{ inputs.email_calendar_connector_id }}
          MULLU_EMAIL_CALENDAR_WORKER_ADAPTER: production
        run: |
          args=(
            --target email-calendar
            --email-calendar-connector-id "${{ inputs.email_calendar_connector_id }}"
            --email-calendar-query "${{ inputs.email_calendar_query }}"
            --json
          )
          if [ "${{ inputs.strict }}" = "true" ]; then
            args+=(--strict)
          fi
          python scripts/produce_capability_adapter_live_receipts.py "${args[@]}"

      - name: Collect adapter evidence summary
        if: always()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_CALENDAR_CONNECTOR_ID: ${{ inputs.email_calendar_connector_id }}
          MULLU_EMAIL_CALENDAR_WORKER_ADAPTER: production
        run: |
          python scripts/collect_capability_adapter_evidence.py \
            --output .change_assurance/capability_adapter_evidence.json \
            --json

      - name: Upload adapter live evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: capability-adapter-live-evidence
          path: |
            .change_assurance/general_agent_promotion_environment_binding_receipt.json
            .change_assurance/browser_sandbox_evidence.json
            .change_assurance/browser_live_receipt.json
            .change_assurance/document_live_receipt.json
            .change_assurance/voice_live_receipt.json
            .change_assurance/gmail_oauth_refresh_receipt.json
            .change_assurance/email_calendar_live_receipt.json
            .change_assurance/capability_adapter_evidence.json
          if-no-files-found: warn
