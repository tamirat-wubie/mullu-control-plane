name: Nightly Infrastructure Certification

on:
  schedule:
    - cron: "23 3 * * *"  # 3:23 AM UTC daily
  workflow_dispatch:  # Manual trigger

# v4.22.0: opt into Node.js 24 for the deprecated actions/* runtime.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  infra-certification:
    name: Infrastructure Certification (PostgreSQL + SMTP)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mullu_test
          POSTGRES_USER: mullu
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: mcoi
        run: pip install -e ".[dev]" psycopg2-binary

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U mullu && break
            sleep 1
          done

      - name: Run PostgreSQL certification
        working-directory: mcoi
        env:
          MULLU_TEST_DB_URL: "postgresql://mullu:test@localhost:5432/mullu_test"
        run: python -m pytest tests/test_infra_certification.py -m "infra_pg" -v --tb=short

      - name: Run SMTP certification
        working-directory: mcoi
        run: python -m pytest tests/test_infra_certification.py -m "infra_smtp" -v --tb=short

  governance-benchmarks:
    name: Governance Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: mcoi
        run: pip install -e ".[dev]"

      - name: Run governance benchmarks
        working-directory: mcoi
        run: |
          python -c "
          from mcoi_runtime.core.governance_bench import run_governance_benchmarks
          import json
          suite = run_governance_benchmarks()
          print(json.dumps(suite.summary(), indent=2))
          for r in suite.results:
              assert r.mean_ns < 10_000_000, f'{r.name} too slow: {r.mean_us:.1f} us'
          print('All governance benchmarks within 10ms threshold.')
          "

      - name: Run import cycle check
        working-directory: mcoi
        run: |
          python -c "
          import os
          from mcoi_runtime.core.import_analyzer import ImportAnalyzer
          import mcoi_runtime
          d = os.path.join(os.path.dirname(os.path.dirname(mcoi_runtime.__file__)), 'mcoi_runtime')
          result = ImportAnalyzer('mcoi_runtime').analyze_directory(d)
          assert not result.has_cycles, f'Import cycles: {[c.summary for c in result.cycles]}'
          print(f'Import analysis: {result.module_count} modules, 0 cycles, max depth {result.max_depth}')
          "

      - uses: actions/setup-python@v5
        if: hashFiles('maf/rust/Cargo.toml') != ''
        with:
          python-version: "3.13"

      - name: Run Rust substrate benchmarks
        if: hashFiles('maf/rust/Cargo.toml') != ''
        working-directory: maf/rust
        run: |
          rustup default stable
          cargo test -p maf-kernel --test substrate_bench -- --nocapture 2>&1 || true

  provider-certification:
    name: LLM Provider Certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch'  # Manual only (costs money)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: mcoi
        run: pip install -e ".[dev]" anthropic openai

      - name: Run Anthropic certification
        if: env.ANTHROPIC_API_KEY != ''
        working-directory: mcoi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest tests/test_infra_certification.py tests/test_live_path_integration.py -m "live_provider" -v --tb=short

      - name: Run OpenAI certification
        if: env.OPENAI_API_KEY != ''
        working-directory: mcoi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m pytest tests/test_infra_certification.py tests/test_live_path_integration.py -m "live_provider" -v --tb=short
