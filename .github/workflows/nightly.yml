name: Nightly Infrastructure Certification

on:
  schedule:
    - cron: "23 3 * * *"  # 3:23 AM UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  infra-certification:
    name: Infrastructure Certification (PostgreSQL + SMTP)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mullu_test
          POSTGRES_USER: mullu
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      mailhog:
        image: mailhog/mailhog
        ports:
          - 1025:1025
          - 8025:8025

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: mcoi
        run: pip install -e ".[dev]" psycopg2-binary

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U mullu && break
            sleep 1
          done

      - name: Run PostgreSQL certification
        working-directory: mcoi
        env:
          MULLU_TEST_DB_URL: "postgresql://mullu:test@localhost:5432/mullu_test"
        run: python -m pytest tests/test_infra_certification.py -m "infra_pg" -v --tb=short

      - name: Run SMTP certification
        working-directory: mcoi
        run: python -m pytest tests/test_infra_certification.py -m "infra_smtp" -v --tb=short

  provider-certification:
    name: LLM Provider Certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch'  # Manual only (costs money)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: mcoi
        run: pip install -e ".[dev]" anthropic openai

      - name: Run Anthropic certification
        if: env.ANTHROPIC_API_KEY != ''
        working-directory: mcoi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest tests/test_infra_certification.py tests/test_live_path_integration.py -m "live_provider" -v --tb=short

      - name: Run OpenAI certification
        if: env.OPENAI_API_KEY != ''
        working-directory: mcoi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m pytest tests/test_infra_certification.py tests/test_live_path_integration.py -m "live_provider" -v --tb=short
