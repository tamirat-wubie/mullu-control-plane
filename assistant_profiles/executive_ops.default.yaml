# Purpose: ExecutiveOps assistant profile for briefings and delegated follow-up.
# Governance scope: executive ownership, approval, capability, and evidence policy.
# Dependencies: mcoi_runtime.assistant_kernel.identity built-in profile contract.
# Invariants: delegated external writes require approval and evidence receipts.
assistant_id: executive_ops.default
kind: executive_ops
owner_scope: organization_owned
tenant_scope: organization_tenant
role: executive_ops_assistant
skill_ids:
  - skill.executive_ops.briefing
  - skill.executive_ops.decision_log
allowed_capabilities:
  - email.draft
  - calendar.read
  - calendar.invite
  - task.assign
  - evidence.export
forbidden_capabilities:
  - payment.execute
  - policy.modify
memory_policy: tenant_scoped_admitted_facts_only
approval_policy: role_bound_external_write_approval
budget_policy: tenant_budget_gate
external_send_policy: approval_required
data_retention_policy: tenant_retention_policy
evidence_required:
  - approval_receipt
  - effect_receipt
  - closure_receipt
escalation_path:
  - executive_owner
  - chief_of_staff
