[pytest]
norecursedirs =
    .git
    .hypothesis
    .pytest_cache
    .ruff_cache
    .tmp*
    tmp*
    __pycache__
markers =
    infra_pg: tests that require PostgreSQL infrastructure
    infra_smtp: tests that require SMTP infrastructure
    live_provider: tests that call live external providers
    soak: long-running soak tests
